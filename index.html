<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UTANI STORE</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <div class="header-content">
    <div class="brand">UTANI STORE</div>

    <button onclick="actualizarPagina()" class="btn-refresh">
      🔄 Actualizar
    </button>
  </div>
</header>

<main class="container">

  <div id="tituloCliente" class="titulo"></div>
  <div id="mensaje" class="mensaje"></div>

  <div id="productos" class="grid"></div>

  <div id="total" class="total"></div>

  <button onclick="enviarCotizacion()" class="btn confirmar">
    🟢 Confirmar cotización
  </button>

</main>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">
    <button class="cerrar" onclick="cerrarModal()">✖</button>
    <div id="contenidoModal"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
