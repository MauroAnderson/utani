<div id="filtros"></div>

<div id="paginacion"></div>

<!-- MODAL IMAGEN -->
<div id="modalImg" class="modal">
  <div class="modal-content">
    <span class="close" onclick="cerrarModal('modalImg')">✖</span>
    <div id="galeria"></div>
  </div>
</div>

<!-- MODAL DESCRIPCIÓN -->
<div id="modalDesc" class="modal">
  <div class="modal-content">
    <span class="close" onclick="cerrarModal('modalDesc')">✖</span>
    <div id="contenidoDesc"></div>
  </div>
</div>

<!-- MODAL OBSEQUIO -->
<div id="modalGift" class="modal">
  <div class="modal-content">
    <span class="close" onclick="cerrarModal('modalGift')">✖</span>
    <div id="contenidoGift"></div>

</div>
