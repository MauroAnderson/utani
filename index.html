<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>UTANI STORE</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="header">UTANI STORE</div>

<div class="container">

    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/1041/1041916.png">

        <div class="info">
            <div class="title">Laptop HP Ryzen 5</div>
            <div class="price">S/ 20.00</div>

            <div class="buttons">
                <button class="btn-primary" onclick="abrirModal()">🔍 Ver detalle</button>
                <button class="btn-secondary" onclick="agregarObsequio()">🎁 Agregar obsequio</button>
            </div>

            <div id="obsequio">Obsequio: S/ 0.00</div>
        </div>
    </div>

    <div class="total">💰 Total: S/ <span id="total">20</span></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h3>Detalle del producto</h3>
        <p>Laptop HP Ryzen 5 - 8GB RAM, SSD 256GB.</p>
        <button class="close" onclick="cerrarModal()">Cerrar</button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
